      <svg width="318" height="50" viewBox="0 0 318 50" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
        <defs>
          <style>
            .brickcolor {fill: #09561F; }

            .blocklabel {
              fill: white;
              font-family: 'Inter', -apple-system, system-ui, sans-serif;
              font-weight: "wght" 200, "slnt" 0;
            }
          </style>
          <!-- Brick Definitions -->
          <rect id="brickpath0" x="0" y="0" width="1" height="1" rx="0.0125" ry="0.06" />
          <path id="highlightpath0" d="m.0.044c0-.026.004-.046.009-.046h.982c.005 0 .009.02.009.046h-.991z" />

          <mask id="hightlightmask0" fill="white">
            <use xlink:href="#brickpath0" />
          </mask>
  
          <radialGradient id="angular0" cx="0" cy="0" r="1" gradientTransform="translate(1.25 0.76) rotate(-60) scale(1.1 3.3)">
            <stop stop-color="white"/>
            <stop offset="0.15" stop-color="white" stop-opacity="0.65"/>
            <stop offset="1" stop-color="white" stop-opacity="0"/>
          </radialGradient>
          <radialGradient id="radial0" cx="0" cy="0" r="1" gradientTransform="translate(0.05 0.3) rotate(90) scale(1.25 0.8)">
            <stop stop-color="white"/>
            <stop offset="1" stop-color="white" stop-opacity="0"/>
          </radialGradient>
          <linearGradient id="linear0" x1="0.5" y1="1" x2="0.5" y2="0.95">
            <stop />
            <stop offset="1" stop-opacity="0"/>
          </linearGradient>
          <linearGradient id="linear1" x1="0" y1="0" x2="0.15" y2="0" gradientUnits="objectBoundingBox">
            <stop stop-color="white"/>
            <stop offset="1" stop-color="white" stop-opacity="0"/>
          </linearGradient>
            
          <pattern id="blockGradient0" patternContentUnits="objectBoundingBox" width="1" height="1">
            <use xlink:href="#brickpath0" class="brickcolor"/>
            <!-- Block Left-Centre Highlight -->
            <use xlink:href="#brickpath0" fill="url(#angular0)" fill-opacity="0.02"/>
            <use xlink:href="#brickpath0" fill="url(#radial0)" fill-opacity="0.1" style="mix-blend-mode:hard-light"/>
            <use xlink:href="#brickpath0" fill="url(#linear0)" fill-opacity="0.3" style="mix-blend-mode:hard-light"/>

            <!-- Block Outside top-edge highlight -->
            <use xlink:href="#highlightpath0" fill="white" style="mix-blend-mode:soft-light" mask="url(#hightlightmask0)"/>
            <use xlink:href="#highlightpath0" fill="url(#linear1)" mask="url(#hightlightmask0)"/>
            <use xlink:href="#highlightpath0" fill="black" fill-opacity="0.2" mask="url(#hightlightmask0)"/>
          </pattern>
          
          <!-- Cap Definitions -->
          <path id="cappath0" d="M0 2C0 0.89543 0.895431 0 2 0H16C17.1046 0 18 0.895431 18 2V7H0V2Z" />
          <path id="cappath1" d="M0 2C0 0.343146 1.34315 -1 3 -1H15C16.6569 -1 18 0.343146 18 2C18 1.44772 17.1046 1 16 1H2C0.895431 1 0 1.44772 0 2Z"/>

          <mask id="capmask0" fill="white">
            <use xlink:href="#cappath1" />
          </mask>

          <linearGradient id="caplinear0" x1="0.5625" y1="1" x2="7.3125" y2="1" gradientUnits="userSpaceOnUse">
            <stop stop-color="white" stop-opacity="0.1"/>
            <stop offset="0.452259" stop-color="white"/>
            <stop offset="1" stop-color="white" stop-opacity="0.1"/>
          </linearGradient>
          <linearGradient id="caplinear1" x1="18" y1="4" x2="10.125" y2="4" gradientUnits="userSpaceOnUse">  
            <stop stop-opacity="0.1"/>
            <stop offset="0.375"/>
            <stop offset="1" stop-opacity="0"/>
          </linearGradient>
          <linearGradient id="caplinear3" x1="1.6875" y1="0" x2="10.125" y2="0" gradientUnits="userSpaceOnUse" > 
            <stop stop-color="white" stop-opacity="0.1"/>
            <stop offset="0.5" stop-color="white"/>
            <stop offset="1" stop-color="white" stop-opacity="0.1"/>
          </linearGradient>

          <pattern id="capGradient0" patternUnits="userSpaceOnUse" x="6" width="32" height="7">
            <use xlink:href="#cappath0" class="brickcolor" />
            <use xlink:href="#cappath0" fill="url(#caplinear0)" fill-opacity="0.3" style="mix-blend-mode:overlay"/>
            <use xlink:href="#cappath0" fill="url(#caplinear1)" fill-opacity="0.2" style="mix-blend-mode:hard-light"/>
            <use xlink:href="#cappath1" fill="url(#caplinear3)" mask="url(#capmask0)" />   
          </pattern>

        </defs>

        <rect x="0" y="0" width="318" height="7" fill="url(#capGradient0)"/>
        <rect x="0" y="7" width="318" height="50" fill="url(#blockGradient0)"/>
        <text class="blocklabel" x="53" y="35">Alternative Dispute Resolution</text>
      </svg>